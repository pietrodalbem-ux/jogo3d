<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paralisia Relativa 3D - Arena Sombria</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="crosshair">+</div>

    <div id="ui-layer">
        <h1 id="title">ARENA DOS ESQUELETOS</h1>
        <h2 id="lives-display" style="color: #ff3333; margin-bottom: 5px;">Vidas: ♥ ♥ ♥</h2>
        <h2 id="score-display" style="color: #ffff33; margin-bottom: 15px;">Pontos: 0</h2>
        
        <p>Clique na tela para prender o mouse e jogar.</p>
        <p>Use W, A, S, D para mover, ESPAÇO para pular e MOUSE para atirar.</p>
    </div>

    <div id="game-over" class="hidden">
        <h1>VOCÊ MORREU</h1>
        <h2 id="final-score" style="color: yellow; margin-bottom: 20px;">Pontuação Final: 0</h2>
        <p>Aperte F5 para tentar novamente.</p>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
